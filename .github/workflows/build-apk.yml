name: Build release APK/AAB

on:
  workflow_dispatch:   # bấm nút "Run workflow" trên tab Actions để chạy thủ công
  push:
    branches: ['**']   # chạy khi push lên bất kỳ nhánh nào (kể cả nhánh test)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      # Decode the release keystore from GitHub Secrets, if configured.
      # See android/KEYSTORE_SETUP.md for how to set these up.
      # Skips silently (falls back to debug signing) when the secret isn't
      # set — e.g. before signing has been configured yet — so the build
      # doesn't hard-fail for contributors who haven't set it up.
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app-release-key.jks
          cat > android/key.properties <<EOF
          storeFile=app-release-key.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # Fires when the secret above is NOT set. This is the exact cause of
      # "updated the version but users still have to uninstall the old app
      # first": without key.properties, the release build below falls back
      # to the debug key — and GitHub Actions runners are a fresh VM every
      # run, so a NEW random debug certificate gets generated each build.
      # versionCode/versionName going up does not matter: Android blocks an
      # in-place update whenever the new APK's signing certificate doesn't
      # match the one already installed, regardless of version. A summary
      # note is easy to miss buried in Gradle's build log, so this prints
      # both a workflow annotation (yellow banner on the run page) and a
      # job-summary block so it's visible without opening any logs.
      - name: Warn if release signing is not configured
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        run: |
          echo "::warning::KEYSTORE_BASE64 secret not set — this build is signed with a throwaway debug key that changes every run. Anyone who installs it will need to uninstall before the NEXT update too. See android/KEYSTORE_SETUP.md."
          {
            echo "### ⚠️ Release signing not configured"
            echo "This APK/AAB is signed with a **debug key that is regenerated on every CI run**."
            echo "Users who install it will be forced to uninstall before installing any future build — bumping \`versionCode\` does not fix this, only a stable release key does."
            echo ""
            echo "Set up the 4 GitHub Secrets in \`android/KEYSTORE_SETUP.md\` (Bước 4) to fix this permanently."
          } >> "$GITHUB_STEP_SUMMARY"

      - run: flutter build apk --release

      # App Bundle (.aab) is what Google Play requires for new app
      # submissions — the APK above is kept for direct/manual install and
      # testing (e.g. sideloading, sharing a test build).
      - run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: formuladoc-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: formuladoc-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
